<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedding Cluster Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --text:      #e2e2f0;
    --muted:     #6b6b8a;
    --accent:    #7c6af7;
    --accent2:   #f76a8a;
    --noise-pt:  2.5;
    --radius:    8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 1fr 340px;
    grid-template-areas: "header header" "plot panel";
    overflow: hidden;
  }

  /* ── Header ───────────────────────────────────────────────── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #search {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  label[for="show-noise"] {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  /* ── Plot area ─────────────────────────────────────────────── */
  #plot-area {
    grid-area: plot;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  svg { width: 100%; height: 100%; display: block; }

  .dot {
    transition: opacity 0.15s, r 0.1s;
    cursor: pointer;
  }
  .dot:hover { stroke-width: 1.5px; }

  .dot.dimmed { opacity: 0.08; }
  .dot.highlighted { opacity: 1 !important; }

  /* cluster hull */
  .hull { fill-opacity: 0.07; stroke-width: 1; stroke-dasharray: 4 3; }

  /* cluster label */
  .cluster-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    fill-opacity: 0.55;
    pointer-events: none;
    text-transform: uppercase;
  }

  /* tooltip */
  #tooltip {
    position: absolute;
    pointer-events: none;
    max-width: 280px;
    background: rgba(17,17,24,0.97);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 13px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 20;
    backdrop-filter: blur(8px);
  }
  #tooltip .tt-cluster {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 0.08em;
  }
  #tooltip .tt-text {
    color: var(--text);
    word-break: break-word;
  }

  /* ── Side panel ────────────────────────────────────────────── */
  #panel {
    grid-area: panel;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  #panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #cluster-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #cluster-list::-webkit-scrollbar { width: 4px; }
  #cluster-list::-webkit-scrollbar-track { background: transparent; }
  #cluster-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cluster-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.12s;
    border-radius: 0;
  }
  .cluster-item:hover { background: rgba(124,106,247,0.07); }
  .cluster-item.active { background: rgba(124,106,247,0.13); }

  .cluster-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cluster-info { flex: 1; min-width: 0; }
  .cluster-name {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cluster-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* detail pane */
  #detail {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    max-height: 260px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
  }
  #detail::-webkit-scrollbar { width: 4px; }
  #detail::-webkit-scrollbar-thumb { background: var(--border); }

  #detail .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  /* drop zone */
  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: var(--bg);
    z-index: 10;
  }

  #drop-zone h2 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--accent);
  }

  #drop-zone p {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }

  #drop-zone.drag-over {
    background: rgba(124,106,247,0.06);
    border: 2px dashed var(--accent);
  }

  .file-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 9px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-transform: uppercase;
  }
  .file-btn:hover { background: var(--accent); color: #fff; }

  #file-input { display: none; }

  /* crosshair guide lines */
  .guide { stroke: var(--muted); stroke-width: 0.5; opacity: 0.3; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>Embedding Explorer</h1>
  <span id="stats">No data loaded</span>
  <div class="header-right">
    <input id="search" type="text" placeholder="Search chunks…" />
    <label for="show-noise">
      <input type="checkbox" id="show-noise" checked>
      Show noise
    </label>
  </div>
</header>

<div id="plot-area">
  <div id="drop-zone">
    <h2>EMBEDDING EXPLORER</h2>
    <p>Drop your <code>embeddings.json</code> here, or click to browse.<br>
       Output of <code>embed_and_cluster.py</code>.</p>
    <button class="file-btn" onclick="document.getElementById('file-input').click()">Load JSON</button>
    <input type="file" id="file-input" accept=".json">
  </div>
  <div id="tooltip"></div>
</div>

<div id="panel">
  <div id="panel-header">Clusters</div>
  <div id="cluster-list"></div>
  <div id="detail"><span style="color:var(--muted);font-size:12px;">Click a point or cluster to see details.</span></div>
</div>

<script>
// ─── Palette ──────────────────────────────────────────────────────────────────
const PALETTE = [
  "#7c6af7","#f76a8a","#6af7c8","#f7c46a","#6ab8f7",
  "#f76af0","#a8f76a","#f7906a","#6af7f0","#c46af7",
  "#f7e26a","#6a7cf7","#f76ab0","#6af78e","#f7a86a",
];
const NOISE_COLOR = "#3a3a5a";

function clusterColor(id) {
  if (id === -1) return NOISE_COLOR;
  return PALETTE[id % PALETTE.length];
}

// ─── State ────────────────────────────────────────────────────────────────────
let allData = [];
let activeCluster = null;
let searchTerm = "";
let showNoise = true;

// ─── D3 setup ─────────────────────────────────────────────────────────────────
const plotArea = document.getElementById("plot-area");
const svg = d3.select("#plot-area").append("svg");
const gHulls  = svg.append("g").attr("class","g-hulls");
const gDots   = svg.append("g").attr("class","g-dots");
const gLabels = svg.append("g").attr("class","g-labels");

// zoom
const zoom = d3.zoom()
  .scaleExtent([0.4, 40])
  .on("zoom", ({transform}) => {
    gHulls.attr("transform", transform);
    gDots.attr("transform", transform);
    gLabels.attr("transform", transform);
    currentTransform = transform;
  });
svg.call(zoom);
let currentTransform = d3.zoomIdentity;

let xScale = d3.scaleLinear();
let yScale = d3.scaleLinear();

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  if (!allData.length) return;

  const W = plotArea.clientWidth;
  const H = plotArea.clientHeight;
  const pad = 60;

  const visible = allData.filter(d => showNoise || d.cluster !== -1);

  xScale.domain(d3.extent(allData, d => d.x)).range([pad, W - pad]);
  yScale.domain(d3.extent(allData, d => d.y)).range([H - pad, pad]);

  // ── hulls ──
  const clusters = d3.group(visible.filter(d => d.cluster !== -1), d => d.cluster);
  const hullData = [];
  clusters.forEach((pts, cid) => {
    if (pts.length >= 3) {
      const hull = d3.polygonHull(pts.map(d => [xScale(d.x), yScale(d.y)]));
      if (hull) hullData.push({ cid, hull, pts });
    }
  });

  gHulls.selectAll(".hull")
    .data(hullData, d => d.cid)
    .join("path")
    .attr("class", "hull")
    .attr("d", d => "M" + d.hull.join("L") + "Z")
    .attr("fill", d => clusterColor(d.cid))
    .attr("stroke", d => clusterColor(d.cid));

  // ── cluster centroid labels ──
  const labelData = hullData.map(({ cid, pts }) => ({
    cid,
    x: d3.mean(pts, d => xScale(d.x)),
    y: d3.mean(pts, d => yScale(d.y)),
  }));

  gLabels.selectAll(".cluster-label")
    .data(labelData, d => d.cid)
    .join("text")
    .attr("class","cluster-label")
    .attr("x", d => d.x)
    .attr("y", d => d.y)
    .attr("text-anchor","middle")
    .attr("fill", d => clusterColor(d.cid))
    .text(d => `C${d.cid}`);

  // ── dots ──
  const dots = gDots.selectAll(".dot")
    .data(visible, d => d.id)
    .join("circle")
    .attr("class","dot")
    .attr("cx", d => xScale(d.x))
    .attr("cy", d => yScale(d.y))
    .attr("r", d => d.cluster === -1 ? 2.5 : 5)
    .attr("fill", d => clusterColor(d.cluster))
    .attr("stroke", d => d3.color(clusterColor(d.cluster)).brighter(0.8))
    .attr("stroke-width", 0.8)
    .attr("fill-opacity", d => d.cluster === -1 ? 0.35 : 0.82)
    .on("mouseover", onDotHover)
    .on("mousemove", onDotMove)
    .on("mouseleave", onDotLeave)
    .on("click", onDotClick);

  applyFilters();
  updateStats();
  buildSidePanel();
  svg.call(zoom.transform, d3.zoomIdentity); // reset zoom on new data
}

// ─── Filters ──────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = searchTerm.toLowerCase();
  gDots.selectAll(".dot")
    .classed("dimmed", d => {
      const clusterMismatch = activeCluster !== null && d.cluster !== activeCluster;
      const searchMiss = q && !d.text.toLowerCase().includes(q);
      return clusterMismatch || searchMiss;
    })
    .classed("highlighted", d => {
      if (!q) return false;
      return d.text.toLowerCase().includes(q);
    });
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

function onDotHover(event, d) {
  const label = d.cluster === -1 ? "noise" : `Cluster ${d.cluster}`;
  tooltip.innerHTML = `
    <div class="tt-cluster">${label}</div>
    <div class="tt-text">${truncate(d.text, 180)}</div>
  `;
  tooltip.style.opacity = 1;
  positionTooltip(event);
}

function onDotMove(event) { positionTooltip(event); }

function onDotLeave() { tooltip.style.opacity = 0; }

function positionTooltip(event) {
  const rect = plotArea.getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 10;
  if (x + 290 > rect.width)  x = event.clientX - rect.left - 294;
  if (y + 120 > rect.height) y = event.clientY - rect.top - 120;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}

// ─── Click dot → detail pane ──────────────────────────────────────────────────
function onDotClick(event, d) {
  event.stopPropagation();
  const label = d.cluster === -1 ? "Noise / unclustered" : `Cluster ${d.cluster}`;
  document.getElementById("detail").innerHTML = `
    <div class="detail-label">${label} · chunk #${d.id}</div>
    <div>${d.text}</div>
  `;
}

// ─── Side panel ───────────────────────────────────────────────────────────────
function buildSidePanel() {
  const list = document.getElementById("cluster-list");
  list.innerHTML = "";

  const clusters = d3.rollups(
    allData.filter(d => d.cluster !== -1),
    v => v.length,
    d => d.cluster
  ).sort((a, b) => d3.ascending(a[0], b[0]));

  const noiseCount = allData.filter(d => d.cluster === -1).length;

  // "All" row
  const allRow = makeClusterRow("ALL", null, allData.length, "#fff");
  list.appendChild(allRow);

  clusters.forEach(([cid, count]) => {
    list.appendChild(makeClusterRow(`Cluster ${cid}`, cid, count, clusterColor(cid)));
  });

  if (noiseCount > 0) {
    list.appendChild(makeClusterRow("Noise", -1, noiseCount, NOISE_COLOR));
  }
}

function makeClusterRow(name, cid, count, color) {
  const div = document.createElement("div");
  div.className = "cluster-item" + (activeCluster === cid ? " active" : "");
  div.innerHTML = `
    <div class="cluster-swatch" style="background:${color}"></div>
    <div class="cluster-info">
      <div class="cluster-name">${name}</div>
      <div class="cluster-count">${count} chunk${count !== 1 ? "s" : ""}</div>
    </div>
  `;
  div.addEventListener("click", () => {
    activeCluster = (activeCluster === cid) ? null : cid;
    buildSidePanel();
    applyFilters();
    if (activeCluster !== null && activeCluster !== -1) {
      zoomToCluster(activeCluster);
    } else {
      svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
    }
  });
  return div;
}

function zoomToCluster(cid) {
  const pts = allData.filter(d => d.cluster === cid);
  if (!pts.length) return;
  const W = plotArea.clientWidth, H = plotArea.clientHeight;
  const xs = pts.map(d => xScale(d.x)), ys = pts.map(d => yScale(d.y));
  const x0 = Math.min(...xs) - 40, x1 = Math.max(...xs) + 40;
  const y0 = Math.min(...ys) - 40, y1 = Math.max(...ys) + 40;
  const scale = Math.min(8, 0.85 / Math.max((x1-x0)/W, (y1-y0)/H));
  const tx = W/2 - scale*(x0+x1)/2, ty = H/2 - scale*(y0+y1)/2;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  const nClusters = new Set(allData.filter(d => d.cluster !== -1).map(d => d.cluster)).size;
  document.getElementById("stats").textContent =
    `${allData.length} chunks · ${nClusters} clusters`;
}

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  applyFilters();
});

document.getElementById("show-noise").addEventListener("change", e => {
  showNoise = e.target.checked;
  render();
});

// Click background → deselect cluster
svg.on("click", () => {
  activeCluster = null;
  buildSidePanel();
  applyFilters();
});

// ─── File loading ─────────────────────────────────────────────────────────────
function loadJSON(text) {
  try {
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error("Expected a JSON array");
    if (!data[0]?.hasOwnProperty("x")) throw new Error("Missing x/y fields — run embed_and_cluster.py first");
    allData = data;
    document.getElementById("drop-zone").style.display = "none";
    render();
  } catch (err) {
    alert("Error loading JSON: " + err.message);
  }
}

document.getElementById("file-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadJSON(ev.target.result);
  reader.readAsText(file);
});

const dz = document.getElementById("drop-zone");
dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("drag-over"); });
dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
dz.addEventListener("drop", e => {
  e.preventDefault();
  dz.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadJSON(ev.target.result);
  reader.readAsText(file);
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => { if (allData.length) render(); });

// ─── Helpers ──────────────────────────────────────────────────────────────────
function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + "…" : str;
}
</script>
</body>
</html>
